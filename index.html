<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
        referrerpolicy="no-referrer" />
    <title>Budget tracker </title>
</head>

<body>
    <div class="container">
        <header class="main-header">
            <nav>
                <div class="main-head">
                    <a href="./index.html">
                        <h3> Budget Tracker </h3>
                    </a>
                </div>
                <ul class="main-list">
                    <li><a href="./html/Daromad.html">daromadlar</a></li>
                    <li><a href="./html/Xrajatlar.html">xarajatlar</a></li>
                    <li><a href="./html/Balans.html">balans</a></li>
                </ul>
            </nav>
        </header>
        <main class="main-container">
            <div class="main-section">

                <section class="main-section-about">
                    <span class="badge">Smart Finance</span>
                    <h1>Budget <span>Tracker</span></h1>
                    <p>Shaxsiy moliyangizni oson va qulay boshqaring.
                        Daromad va xarajatlaringizni kuzatib boring,
                        oylik hisobotlarni ko'ring.</p>
                    <div class="about-features">
                        <div class="feat-pill">Sodda interfeys</div>
                        <div class="feat-pill">Tezkor ishlash</div>
                        <div class="feat-pill">Har qurilmada</div>
                    </div>
                    <button class="about-cta">Boshlash →</button>
                </section>


                <!-- forma mlumotlari  -->
                <section class="main-setion-malumotlar">
                    <div class="form-card">
                        <form class="form-event">
                            <div class="form-title">// Yangi Tranzaksiya</div>

                            <div class="form-group">
                                <label>Tur</label>
                                <div class="type-toggle">
                                    <button class="type-btn active-income" id="btn-income" type="button">+
                                        Daromad</button>
                                    <button class="type-btn" id="btn-expense" type="button">− Xarajat</button>
                                </div>
                            </div>

                            <div class="form-row">
                                <div>
                                    <label>Nomi</label>
                                    <input class="Input-maosh" type="text" placeholder="Masalan: Maosh" />
                                </div>
                                <div>
                                    <label>Summa (so'm)</label>
                                    <input class="Input-NUM" type="number" placeholder="0" />
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Kategoriya</label>
                                <select id="kategoriya">
                                    <option value="ish">💼 Ish / Daromad</option>
                                    <option value="oziq-ovqat">🍔 Oziq-ovqat</option>
                                    <option value="transport">🚗 Transport</option>
                                    <option value="talim">📚 Ta'lim</option>
                                    <option value="kongilochar">🎮 Ko'ngilochar</option>
                                    <option value="soglik">🏥 Sog'liq</option>
                                    <option value="sport">⚽ Sport</option>
                                    <option value="kiyim">🥼 Kiyim</option>
                                </select>
                            </div>

                            <button class="add-btn" type="submit">Qo'shish →</button>
                        </form>
                </section>

            </div>
    </div>




    </main>

    <footer></footer>
    </div>



    <script src="./js/index.js"></script>
    <script src="./js/Daromad.js"></script>
</body>

</html>
